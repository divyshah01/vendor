<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge - Reset Password</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your email to recover your credentials</p>
    </div>

    <form method="POST" action="{% url 'forgot_password' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Corporate Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@company.com">
        </div>
        <button type="submit" class="btn-auth">Send Recovery Link</button>
    </form>

    <div class="auth-footer">
        <p><a href="{% url 'login' %}">Return to Login</a></p>
    </div>
</div>

</body>
</html>
